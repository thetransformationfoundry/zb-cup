<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0079BD">
  <title>ZB Cup — 2026 World Cup</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Ccircle cx='18' cy='18' r='17' fill='%230079BD'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app"><div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:#6B7280;font-family:-apple-system,BlinkMacSystemFont,sans-serif">Loading…</div></div>

  <!-- Data + logo (plain scripts so it runs even when opened directly) -->
  <script src="js/firebase-config.js"></script>
  <script src="js/logo.js"></script>
  <script src="data/teams.js"></script>
  <script src="data/fixtures.js"></script>

  <!-- Storage layer: Firebase (live, once keys are pasted) or the local demo store -->
  <script>
    (function () {
      var FB = "https://www.gstatic.com/firebasejs/10.12.2/";
      var tags = window.ZB_LIVE
        ? [FB + "firebase-app-compat.js", FB + "firebase-auth-compat.js", FB + "firebase-firestore-compat.js", "js/store-firebase.js"]
        : ["js/store.js"];
      tags.forEach(function (src) { document.write('<script src="' + src + '"><\/script>'); });
    })();
  </script>

  <!-- App -->
  <script src="js/app.js"></script>
  <script>
    (function () {
      function boot() { window.ZB_BOOT && window.ZB_BOOT(); }
      if (window.ZB_STORE && window.ZB_STORE.ready && window.ZB_STORE.ready.then) window.ZB_STORE.ready.then(boot);
      else boot();
    })();
  </script>
</body>
</html>
