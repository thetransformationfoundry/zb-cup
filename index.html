<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0079BD">
  <!-- Installed (Add to Home Screen) app behaviour -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ZB Cup">
  <title>ZB Cup — 2026 World Cup</title>
  <link rel="icon" href="assets/apple-touch-icon.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <!-- Bump ?v= whenever you change CSS/JS so phones fetch the new version (no stale cache). -->
  <link rel="stylesheet" href="css/styles.css?v=27">
</head>
<body>
  <div id="app"><div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:#6B7280;font-family:-apple-system,BlinkMacSystemFont,sans-serif">Loading…</div></div>

  <!-- Data + logo (plain scripts so it runs even when opened directly) -->
  <script src="js/firebase-config.js?v=27"></script>
  <script src="js/logo.js?v=27"></script>
  <script src="data/teams.js?v=27"></script>
  <script src="data/fixtures.js?v=27"></script>

  <!-- Storage layer: Firebase (live, once keys are pasted) or the local demo store -->
  <script>
    (function () {
      var FB = "https://www.gstatic.com/firebasejs/10.12.2/";
      var tags = window.ZB_LIVE
        ? [FB + "firebase-app-compat.js", FB + "firebase-auth-compat.js", FB + "firebase-firestore-compat.js", "js/store-firebase.js?v=27"]
        : ["js/store.js?v=27"];
      tags.forEach(function (src) { document.write('<script src="' + src + '"><\/script>'); });
    })();
  </script>

  <!-- App -->
  <script src="js/app.js?v=27"></script>
  <script>
    (function () {
      function boot() { window.ZB_BOOT && window.ZB_BOOT(); }
      if (window.ZB_STORE && window.ZB_STORE.ready && window.ZB_STORE.ready.then) window.ZB_STORE.ready.then(boot);
      else boot();
    })();
  </script>
</body>
</html>
